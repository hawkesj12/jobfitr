# jobfitr — WIDE harvest config (the scheduled snapshot build)
#
# This is deliberately permissive: it pulls the BROAD job universe into
# jobs.json. Each user's NARROW lens (their titles, boosts, excludes, min_score)
# is applied later at request time in the API — never here. Copy to
# web-harvest.yaml to tune without touching the committed example.
#
# NOTE: job_radar still runs its relevance gate during harvest, so `signal_titles`
# must be a broad catch-all (a union of common role words across sectors) or most
# postings get dropped before they reach the cache. Keep it wide on purpose.
#
# Reality check: the free, no-key boards (remotive/jobicy/remoteok/himalayas/…)
# skew remote-tech. A broad non-tech harvest stays thin until Adzuna/USAJOBS keys
# are added — those two self-skip with no creds, so leaving them listed is safe.

profile:
  title_queries: # what we SEARCH the boards for (broad, cross-sector net)
    # tech + corporate
    - software engineer
    - developer
    - data
    - product manager
    - designer
    - marketing
    - sales
    - operations
    - customer success
    - project manager
    - analyst
    - writer
    - support
    - finance
    - human resources
    # broader sectors (Adzuna reaches these nationwide once keys are set)
    - manager
    - retail
    - nurse
    - healthcare
    - warehouse
    - driver
    - teacher
    - accountant
    - administrative assistant
  signal_titles: # relevance gate — broad union so most real roles pass
    - engineer
    - developer
    - programmer
    - manager
    - analyst
    - designer
    - specialist
    - coordinator
    - director
    - lead
    - consultant
    - scientist
    - writer
    - editor
    - marketer
    - accountant
    - technician
    - associate
    - representative
    - administrator
    - strategist
    - architect
    - officer
    - agent
    - planner
    - nurse
    - teacher
    - recruiter
    - success
    - support
    - operations
    - product
    - designer

filters:
  remote_only: false # keep on-site + hybrid too; the user narrows later
  # Empty = no geographic filter, so Adzuna/USAJOBS return jobs NATIONWIDE (a real
  # place name here, e.g. "remote", makes Adzuna's `where=` match a city and return
  # nothing). The per-user location lens is applied later at request time.
  location: ""
  exclude_titles: [] # no exclusions at harvest — the user excludes at request time
  max_age_days: 90 # generous; per-user freshness is applied at request time
  min_score: 0 # harvest keeps everything; scoring/threshold happens per-request

sources:
  # Breadth (market-wide boards). The no-key ones run today; adzuna/usajobs
  # self-skip until their keys are set, so listing them here is harmless.
  boards:
    - remotive
    - jobicy
    - arbeitnow
    - remoteok
    - himalayas
    - hn
    - braintrust
    - techtree
    - adzuna
    - usajobs
  # Adzuna is the general-market firehose (all sectors, nationwide). It caps a page
  # at 50 results, so `pages` × 50 ≈ jobs/query before dedup. The remote lens is
  # selective, so fetch deep enough that plenty survive it. Env override: ADZUNA_PAGES.
  adzuna:
    pages: 3 # 3×50 = up to 150 jobs/query/harvest; raise for more breadth
  # USAJOBS caps a page at 500 (default 25) — one big page covers most federal
  # queries. Env override: USAJOBS_RESULTS_PER_PAGE.
  usajobs:
    results_per_page: 500
  # Depth (per-company ATS) only runs when --watchlist is passed; defaults are fine.
  funnel:
    auto_grow: false # a read-only harvest never mutates a watchlist file
